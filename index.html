<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BSI Intelligence - Stability Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --primary: #27ae60; --dark: #0a0a0a; --card: #141414; --border: #2a2a2a; --danger: #c0392b; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .top-shelf { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-value { display: block; font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #progress-container { width: 100%; background: #1a1a1a; height: 8px; border-radius: 4px; margin-bottom: 25px; overflow: hidden; display: none; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .upload-zone { border: 2px dashed var(--primary); padding: 20px; border-radius: 12px; background: var(--card); flex-grow: 1; text-align: center; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-bottom: 40px; }
        th { text-align: left; padding: 12px 15px; background: #1c1c1c; color: #888; font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .ticker { font-weight: 800; color: var(--primary); font-family: monospace; }
        .gain-up { color: #00ff88; } .gain-down { color: #ff4d4d; }
        button { background: #333; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-exit { background: #2980b9; } .btn-danger { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-shelf">
        <div class="stat-card">
            <span class="stat-label">Active Signals</span>
            <span id="count-active" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Exited Trades</span>
            <span id="count-exited" class="stat-value">0</span>
        </div>
    </div>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="header-flex">
        <div class="upload-zone" onclick="document.getElementById('pdf-upload').click()">
            <input type="file" id="pdf-upload" accept=".pdf" multiple style="display:none" />
            <span id="upload-text" style="color:var(--primary); font-weight:bold;">+ Click to Upload BSI PDF Reports</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="syncData()" style="background:var(--primary)">🔄 Sync Market Data</button>
            <button class="btn-danger" onclick="hardReset()">Reset All Data</button>
        </div>
    </div>

    <table>
        <thead><tr><th>Ticker</th><th>Hits</th><th>Gain %</th><th>Price</th><th>In (Yahoo)</th><th>Today %</th><th>First Seen</th><th>Days</th><th>Action</th></tr></thead>
        <tbody id="activeBody"></tbody>
    </table>

    <h2 style="font-size:1rem; color:#e67e22; margin-bottom:10px;">🏁 Exit History</h2>
    <table>
        <thead><tr><th>Ticker</th><th>Exit Date</th><th>Date In</th><th>Days</th><th>In</th><th>Out</th><th>Profit %</th><th>Action</th></tr></thead>
        <tbody id="exitBody"></tbody>
    </table>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const FIN_KEY = 'd7kgcehr01qiqbcu9i6gd7kgcehr01qiqbcu9i70';
    
    // Updated to a more robust proxy for large batches
    const PROXY = "https://api.allorigins.win/get?url=";

    let signalRegistry = JSON.parse(localStorage.getItem('bsi_signals')) || {};
    let exitHistory = JSON.parse(localStorage.getItem('bsi_exits')) || [];

    window.onload = () => { if(Object.keys(signalRegistry).length > 0) syncData(); };

    function hardReset() { if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) { await parsePDF(file); }
        await syncData();
    });

    async function parsePDF(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ") + " ";
                }
                const dateMatch = text.match(/\d{4}-\d{2}-\d{2}/);
                const reportDate = dateMatch ? dateMatch[0] : new Date().toISOString().split('T')[0];
                const tickers = [...new Set(text.match(/\b[A-Z]{2,5}\b/g) || [])].filter(t => !["BSI", "NYSE", "NASD", "REIT", "ETF"].includes(t)).slice(0, 30);

                tickers.forEach(t => {
                    if (!signalRegistry[t]) signalRegistry[t] = { firstSeen: reportDate, hits: 1 };
                    else { signalRegistry[t].hits++; if (new Date(reportDate) < new Date(signalRegistry[t].firstSeen)) signalRegistry[t].firstSeen = reportDate; }
                });
                localStorage.setItem('bsi_signals', JSON.stringify(signalRegistry));
                resolve();
            };
            reader.readAsArrayBuffer(file);
        });
    }

    async function getYahooOpen(symbol, dateStr) {
        try {
            const start = Math.floor(new Date(dateStr + "T00:00:00Z").getTime() / 1000);
            const target = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${start}&period2=${start+172800}&interval=1d`;
            const resp = await fetch(PROXY + encodeURIComponent(target));
            const data = await resp.json();
            const parsed = JSON.parse(data.contents);
            return parsed.chart.result[0].indicators.quote[0].open[0];
        } catch (e) { return null; }
    }

    async function syncData() {
        const tickers = Object.keys(signalRegistry);
        const total = tickers.length;
        document.getElementById('count-active').innerText = total;
        document.getElementById('count-exited').innerText = exitHistory.length;
        if (total === 0) { renderExits(); return; }

        const progContainer = document.getElementById('progress-container');
        const progBar = document.getElementById('progress-bar');
        progContainer.style.display = 'block';
        
        let tableData = [];
        let completed = 0;

        for (const symbol of tickers) {
            try {
                // Request live quote
                const qResp = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FIN_KEY}`);
                const q = await qResp.json();
                
                // Get Yahoo Historical or Fallback to current open
                const d = signalRegistry[symbol].firstSeen;
                let priceIn = await getYahooOpen(symbol, d);
                
                // CRITICAL FALLBACK: If Yahoo fails, use Finnhub's daily open so ticker shows up
                if (!priceIn) priceIn = q.o || q.c;

                if (q.c && priceIn) {
                    const days = Math.floor((new Date() - new Date(d)) / 86400000);
                    tableData.push({ symbol, hits: signalRegistry[symbol].hits, gain: ((q.c - priceIn) / priceIn * 100), current: q.c, priceIn, today: ((q.c - q.pc) / q.pc * 100), date: d, days });
                }
            } catch (err) { console.error("Error loading " + symbol); }
            
            completed++;
            progBar.style.width = `${(completed / total) * 100}%`;
        }
        
        tableData.sort((a, b) => (a.days - b.days) || (b.gain - a.gain));
        renderActive(tableData);
        renderExits();
        setTimeout(() => { progContainer.style.display = 'none'; }, 800);
    }

    function renderActive(data) {
        document.getElementById('activeBody').innerHTML = data.map(item => `
            <tr>
                <td class="ticker">${item.symbol}</td>
                <td>${item.hits}</td>
                <td class="${item.gain >= 0 ? 'gain-up' : 'gain-down'}">${item.gain.toFixed(2)}%</td>
                <td style="font-weight:bold">$${item.current.toFixed(2)}</td>
                <td style="color:#aaa">$${item.priceIn.toFixed(2)}</td>
                <td class="${item.today >= 0 ? 'gain-up' : 'gain-down'}">${item.today.toFixed(2)}%</td>
                <td>${item.date}</td>
                <td>${item.days}d</td>
                <td><button class="btn-exit" onclick="moveToExit('${item.symbol}', ${item.priceIn}, ${item.current}, '${item.date}', ${item.days})">Exit</button></td>
            </tr>
        `).join('');
    }

    function moveToExit(symbol, priceIn, priceOut, dateIn, days) {
        exitHistory.push({ symbol, exitDate: new Date().toISOString().split('T')[0], dateIn, daysHeld: days, priceIn, priceOut, profit: ((priceOut - priceIn) / priceIn * 100).toFixed(2) });
        delete signalRegistry[symbol];
        localStorage.setItem('bsi_signals', JSON.stringify(signalRegistry));
        localStorage.setItem('bsi_exits', JSON.stringify(exitHistory));
        syncData();
    }

    function deleteExit(idx) {
        if(confirm("Delete exit?")) { exitHistory.splice(idx, 1); localStorage.setItem('bsi_exits', JSON.stringify(exitHistory)); syncData(); }
    }

    function renderExits() {
        document.getElementById('exitBody').innerHTML = exitHistory.map((item, idx) => `
            <tr>
                <td class="ticker">${item.symbol}</td>
                <td>${item.exitDate}</td>
                <td>${item.dateIn}</td>
                <td>${item.daysHeld}d</td>
                <td>$${item.priceIn.toFixed(2)}</td>
                <td>$${item.priceOut.toFixed(2)}</td>
                <td class="${item.profit >= 0 ? 'gain-up' : 'gain-down'}">${item.profit}%</td>
                <td><button class="btn-danger" onclick="deleteExit(${idx})">Delete</button></td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
